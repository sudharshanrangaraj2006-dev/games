<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card a {
            text-decoration: none;
            color: #00ffcc;
            font-weight: bold;
        }

        .game-card a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>🎮 Game Library</h1>

    <div class="game-container" id="gameContainer"></div>

    <script>
        const games = [
            {
                name: "GTA V",
                link: "https://gofile.io/d/Awi5p5"
            },
            {
                name: "PUBG",
                link: "#"
            },
            {
                name: "Call of Duty",
                link: "#"
            },
            {
                name: "Minecraft",
                link: "#"
            }
        ];

        const container = document.getElementById("gameContainer");

        games.forEach(game => {
            const card = document.createElement("div");
            card.className = "game-card";

            card.innerHTML = `
                <h3>${game.name}</h3>
                <a href="${game.link}" target="_blank">Download / Open</a>
            `;

            container.appendChild(card);
        });
    </script>

</body>
</html>
