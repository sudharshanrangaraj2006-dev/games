<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game List with Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            background: #1e1e1e;
            border-radius: 10px;
            width: 220px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .game-content {
            padding: 15px;
        }

        .game-content h3 {
            margin: 10px 0;
        }

        .game-content a {
            text-decoration: none;
            color: #00ffcc;
            font-weight: bold;
        }

        .game-content a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>🎮 Game Library</h1>

    <div class="game-container" id="gameContainer"></div>

    <script>
        const games = [
            {
                name: "GTA V",
                link: "https://gofile.io/d/Awi5p5",
                image: "https://wallpapercave.com/wp/wp1813128.jpg"
            },
            {
                name: "PUBG",
                link: "#",
                image: "https://wallpapercave.com/wp/wp7426625.jpg"
            },
            {
                name: "Call of Duty",
                link: "#",
                image: "https://wallpapercave.com/wp/wp5072456.jpg"
            },
            {
                name: "Minecraft",
                link: "#",
                image: "https://wallpapercave.com/wp/wp2337005.jpg"
            }
        ];

        const container = document.getElementById("gameContainer");

        games.forEach(game => {
            const card = document.createElement("div");
            card.className = "game-card";

            card.innerHTML = `
                <img src="${game.image}" alt="${game.name}">
                <div class="game-content">
                    <h3>${game.name}</h3>
                    <a href="${game.link}" target="_blank">Download / Open</a>
                </div>
            `;

            container.appendChild(card);
        });
    </script>

</body>
</html>
