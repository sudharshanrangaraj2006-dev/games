<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sudharshan Game Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            background: #1e1e1e;
            border-radius: 10px;
            width: 220px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }

        .game-content {
            padding: 15px;
        }

        .game-content h3 {
            margin: 10px 0;
        }

        .game-content a {
            text-decoration: none;
            color: #00ffcc;
            font-weight: bold;
        }

        .game-content a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>🎮 Game Library</h1>

    <div class="game-container" id="gameContainer"></div>

    <script>
        const games = [
            {
                name: "GTA Vice City",
                link: "https://oceantogames.com/gta-vice-city-download-pc-working-link-step-2/",
                image: "https://oceantogames.com/wp-content/uploads/2025/12/gta-vice-city-768x421.webp"
            },{
                name: "GTA IV",
                link: "https://oceantogames.com/grand-theft-auto-4-download-pc-reviews-v17-6/",
                image: "https://res.cloudinary.com/jerrick/image/upload/v1697690292/6530b2b4bf996c001cd7a829.jpg"
            },  {
                name: "GTA San Andreas",
                link: "https://archive.org/download/gta-san-andreas-full-game/GTA%20San%20Andreas%20full%20game.zip",
                image: "https://cdn-www.bluestacks.com/bs-images/6_com.rockstargames.gtasa_.jpg"
            },
             {
                name: "GTA V",
                link: "https://gofile.io/d/Awi5p5",
                image: "https://www.adriancourreges.com/img/blog/2015/gtav/a/gtav_logo.jpg"
            },
             {
                name: "Red Dead Redemption 2",
                link: "https://oceantogames.com/red-dead-redemption-2-for-pc/",
                image: "https://oceantogames.com/wp-content/uploads/2026/02/Red-Dead-Redemption-2-768x440.webp"
            }
        ];

        const container = document.getElementById("gameContainer");

        games.forEach(game => {
            const card = document.createElement("div");
            card.className = "game-card";

            card.innerHTML = `
                <img src="${game.image}" alt="${game.name}">
                <div class="game-content">
                    <h3>${game.name}</h3>
                    <a href="${game.link}" target="_blank">Download / Open</a>
                </div>
            `;

            container.appendChild(card);
        });
    </script>

</body>
</html>
